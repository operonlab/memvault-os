name: build-images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (without leading v)"
        required: false
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    name: build-push (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # worker reuses the api image (compose overrides CMD), so we only
        # build & push three distinct images.
        app: [api, web, embed-gateway]
    outputs:
      api-digest: ${{ steps.collect.outputs.api-digest }}
      web-digest: ${{ steps.collect.outputs.web-digest }}
      embed-gateway-digest: ${{ steps.collect.outputs.embed-gateway-digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-main.${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/operonlab/memvault-${{ matrix.app }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          # api image bundles apps/worker too (compose worker reuses this
          # image with a different CMD), so api needs the repo root as
          # context. web / embed-gateway stay with their app directory.
          context: ${{ matrix.app == 'api' && '.' || format('./apps/{0}', matrix.app) }}
          file: ./apps/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max

      - name: Collect digest
        id: collect
        run: |
          echo "${{ matrix.app }}-digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.app }}.digest

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.app }}
          path: /tmp/digests/${{ matrix.app }}.digest
          retention-days: 1

  pin-images:
    name: pin-images
    needs: build-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Run pin-images.sh
        run: |
          if [ -x scripts/pin-images.sh ]; then
            export API_DIGEST=$(cat /tmp/digests/api.digest 2>/dev/null || echo "")
            export WEB_DIGEST=$(cat /tmp/digests/web.digest 2>/dev/null || echo "")
            export EMBED_DIGEST=$(cat /tmp/digests/embed-gateway.digest 2>/dev/null || echo "")
            export WORKER_DIGEST=$(cat /tmp/digests/worker.digest 2>/dev/null || echo "")
            scripts/pin-images.sh
          else
            echo "::warning::scripts/pin-images.sh not found or not executable, skipping"
          fi

      - name: Open digest update PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ci/pin-image-digests
          base: main
          delete-branch: true
          commit-message: "chore(ci): pin image digests in .env.example"
          title: "chore(ci): pin image digests"
          body: |
            Automated digest pin from `build-images.yml` after push to `main`.

            Updates `.env.example` with the latest pushed image digests
            (`API_DIGEST`, `WEB_DIGEST`, `EMBED_DIGEST`, `WORKER_DIGEST`).

            Generated by `scripts/pin-images.sh`.
          labels: |
            ci
            automated
