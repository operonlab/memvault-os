# macOS override — embed-gateway 走 mlx_proxy backend，
# 透過 host.docker.internal 連到 host 上的 MLX sidecar (127.0.0.1:18081)
# 啟動：docker compose -f infra/docker-compose.yml -f infra/docker-compose.mac.yml --env-file .env up -d

services:
  embed-gateway:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      EMBED_BACKEND: mlx_proxy
      MLX_HOST_URL: http://host.docker.internal:18081
