# Frozen tier override — 啟用 MinIO，作為冷凍 block 的 S3-compatible 儲存
# 啟動：docker compose -f infra/docker-compose.yml -f infra/docker-compose.frozen.yml --env-file .env up -d

services:
  minio:
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z@${MINIO_DIGEST}
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-memvault}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio-data:/data
    networks:
      - memvault-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5

  api:
    environment:
      MEMVAULT_FROZEN_TIER: enabled
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-memvault-frozen}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-memvault}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_REGION: ${S3_REGION:-us-east-1}
    depends_on:
      minio:
        condition: service_healthy

  worker:
    environment:
      MEMVAULT_FROZEN_TIER: enabled
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-memvault-frozen}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-memvault}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_REGION: ${S3_REGION:-us-east-1}
    depends_on:
      minio:
        condition: service_healthy

volumes:
  minio-data:
